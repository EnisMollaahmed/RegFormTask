<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>RegFormTask</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="top">
    <nav>
      <button id="nav-register">Register</button>
      <button id="nav-login">Login</button>
      <button id="nav-profile">Profile</button>
    </nav>
  </header>

  <main>
    <section id="msg" class="hidden"></section>

    <section id="register" class="view">
      <h2>Register</h2>
      <form id="form-register">
        <label>Email<input name="email" type="email" required></label>
        <label>Names<input name="names" type="text" required></label>
        <label>Password<input name="password" type="password" required></label>
        <label>Confirm Password<input name="confirm" type="password" required></label>
        <div class="captcha-row">
          <img id="captcha-img" alt="captcha" src="" />
          <button type="button" id="reload-captcha">Reload</button>
        </div>
        <label>Enter CAPTCHA<input name="captcha" type="text" maxlength="6" required></label>
        <button type="submit">Register</button>
      </form>
    </section>

    <section id="login" class="view hidden">
      <h2>Login</h2>
      <form id="form-login">
        <label>Email<input name="email" type="email" required></label>
        <label>Password<input name="password" type="password" required></label>
        <button type="submit">Login</button>
      </form>
    </section>

    <section id="profile" class="view hidden">
      <h2>Profile</h2>
      <form id="form-profile">
        <label>Email<input name="email" type="email" disabled></label>
        <label>Names<input name="names" type="text" required></label>
        <label>New Password (leave empty to keep)<input name="password" type="password"></label>
        <button type="submit">Save</button>
      </form>
      <button id="btn-logout">Logout</button>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
